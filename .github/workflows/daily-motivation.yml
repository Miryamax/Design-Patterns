name: Daily Morning Motivation

on:
  schedule:
    # 07:00 UTC = 10:00 AM Israel Daylight Time (IDT = UTC+3, Apr–Oct)
    # In winter (IST = UTC+2) this fires at 09:00 — change to '0 8 * * *' from Nov–Mar
    - cron: '0 7 * * *'
  workflow_dispatch: # allows manual test runs from the Actions tab

jobs:
  send-motivation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send morning motivation to Teams
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python3 .github/scripts/daily_motivation.py
